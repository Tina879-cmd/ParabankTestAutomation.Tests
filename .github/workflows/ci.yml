name: .NET Playwright CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore ParabankTestAutomation.slnx

    - name: Build
      run: dotnet build ParabankTestAutomation.slnx --configuration Release --no-restore

    - name: Install Playwright Browsers
      run: pwsh bin/Release/net10.0/playwright.ps1 install

    - name: Run tests
      run: dotnet test ParabankTestAutomation.slnx --no-build --configuration Release --logger:"trx"
      continue-on-error: true

    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: '**/TestResults/*.trx'

    - name: Upload Playwright HTML Report
      uses: actions/upload-artifact@v4
      with:
         name: playwright-traces
         path: bin/Release/net10.0/Traces/

    - name: Upload Logs
      uses: actions/upload-artifact@v4
      with:
         name: playwright-logs
         path: bin/Release/net10.0/Logs/

    - name: Upload Screenshots
      uses: actions/upload-artifact@v4
      with:
         name: playwright-screenshots
         path: bin/Release/net10.0/Screenshots/
